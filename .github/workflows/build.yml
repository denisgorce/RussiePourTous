name: 🇷🇺 Build Russie Pour Tous APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🦋 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-warnings

      - name: 🏗️ Build APK (debug)
        run: flutter build apk --debug --no-tree-shake-icons

      - name: 🏗️ Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: russie-pour-tous-apk
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 🚀 Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "🇷🇺 RussiePourTous v${{ github.run_number }}"
          body: |
            ## Russie Pour Tous — Build automatique

            Application Flutter bilingue FR/RU pour découvrir la Russie.
            
            ### 📱 Installation
            Téléchargez `app-release.apk` et installez-le sur Android.
            (Autoriser les sources inconnues dans les paramètres si nécessaire.)
            
            ### 📚 Contenu
            - 10 modules × 5 leçons sur la Russie
            - Interface FR/RU avec toggle
            - Quiz, glossaire, ressources voyage
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
